# ============================================================
#  ~/.config/hypr/hyprlock.conf
#  Warm retro palette — matches Waybar, Kitty, SDDM
#  Triggered by: SUPER + Escape
# ============================================================

general {
    hide_cursor      = true
    ignore_empty_input = true
}

# ── Background ───────────────────────────────────────────────
# Set path to your wallpaper — same one hyprpaper uses

background {
    monitor      =
    path         = ~/Pictures/Wallpapers/main.png
    blur_passes  = 3
    blur_size    = 6
    brightness   = 0.75
    contrast     = 0.90
    vibrancy     = 0.1696
}

# ── Cream overlay shape ──────────────────────────────────────

shape {
    monitor      =
    size         = 420, 280
    color        = rgba(232, 220, 200, 0.88)
    rounding     = 14
    border_size  = 2
    border_color = rgba(197, 74, 26, 1.0)
    position     = 0, 60
    halign       = center
    valign       = center
    zindex       = 1
}

# ── Clock ─────────────────────────────────────────────────────

label {
    monitor      =
    text         = cmd[update:1000] echo "$(date +"%H:%M")"
    color        = rgba(42, 16, 8, 1.0)
    font_size    = 64
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 130
    halign       = center
    valign       = center
    shadow_passes = 0
    zindex       = 2
}

# ── Date ──────────────────────────────────────────────────────

label {
    monitor      =
    text         = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color        = rgba(122, 48, 16, 1.0)
    font_size    = 14
    font_family  = JetBrainsMono Nerd Font
    position     = 0, 72
    halign       = center
    valign       = center
    shadow_passes = 0
    zindex       = 2
}

# ── Greeting ──────────────────────────────────────────────────

label {
    monitor      =
    text         = Hi, $USER
    color        = rgba(197, 74, 26, 1.0)
    font_size    = 13
    font_family  = JetBrainsMono Nerd Font Bold
    position     = 0, 22
    halign       = center
    valign       = center
    shadow_passes = 0
    zindex       = 2
}

# ── Password input field ──────────────────────────────────────

input-field {
    monitor           =
    size              = 340, 46
    outline_thickness = 2
    dots_size         = 0.28
    dots_spacing      = 0.18
    dots_center       = true
    dots_rounding     = -1

    outer_color       = rgba(197, 74, 26, 1.0)
    inner_color       = rgba(232, 220, 200, 0.95)
    font_color        = rgba(42, 16, 8, 1.0)

    fade_on_empty     = true
    fade_timeout      = 1000
    placeholder_text  = <i>Password...</i>

    check_color       = rgba(224, 120, 32, 1.0)
    fail_color        = rgba(168, 32, 16, 1.0)
    fail_text         = <i>Wrong password</i>
    fail_transition   = 300

    rounding          = 8
    position          = 0, -30
    halign            = center
    valign            = center
    zindex            = 2
}
