# ============================================================
#  ~/.config/matugen/templates/hyprland-colors.conf
#  Syntax verified from official matugen wiki
# ============================================================

$primary         = rgb({{colors.primary.default.hex_stripped}})
$on_primary      = rgb({{colors.on_primary.default.hex_stripped}})
$secondary       = rgb({{colors.secondary.default.hex_stripped}})
$surface         = rgb({{colors.surface.default.hex_stripped}})
$error           = rgb({{colors.error.default.hex_stripped}})
$active_border   = rgba({{colors.primary.default.hex_stripped}}ff) rgba({{colors.tertiary.default.hex_stripped}}ff) 45deg
$inactive_border = rgba({{colors.surface_variant.default.hex_stripped}}ff)
